<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel</title>
    <link

      referrerpolicy="no-referrer"

    <link href="http://fonts.cdnfonts.com/css/magra" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Aleo&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="style.css" />

              height="30px"
              src="logo.svg"
              alt="logotip"
            />
            <p class="textlogo">Travel Portal</p>
          </div>
          <nav class="navigation">
            <ul class="hug">
              <li><span class="navname">How It Works</span></li>
              <li><span class="navname">Plan Your Trip</span></li>
              <li><span class="navname">Destination</span></li>
              <li><span class="navname">Travel Stories</span></li>
            </ul>
          </nav>
          <input class="login" type="button" value="Login" />
        </header>
      </div>
      <div class="searchbox">
          <div class = 'box'>
            <h1 class="title">Explore the beauty of the World</h1>
            <span class="description"
            >Receive personalized recommendations for countries, hotels,
            activities and more</span
            >
            <div class="searchbar">
              <p class="arcticle">What would you like?
                <input class="start" type="button" value="Start Plannig">
              </p>
              
            </div>
          </div>
          
      </div>
    </div>
